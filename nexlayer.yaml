application:
  name: keycloak
  pods:
    - name: keycloak
      image: "registry.nexlayer.io/user_01kece1xyh817dwff7wnarhkxd/keycloak:9f0bca6-fix5"
      path: /
      servicePorts:
        - 8080
      vars:
        KC_DB: "postgres"
        KC_HEALTH_ENABLED: "true"
        KC_METRICS_ENABLED: "true"
        JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport"
